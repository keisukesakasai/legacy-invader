<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <title>Legacy Invader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrap">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div id="left-pad">
        <button id="btn-left" class="ctrl-btn" aria-label="左">◀</button>
        <button id="btn-right" class="ctrl-btn" aria-label="右">▶</button>
      </div>
      <button id="btn-shoot" class="ctrl-btn fire-btn" aria-label="射撃">●</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
